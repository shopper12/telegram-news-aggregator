name: Telegram news briefing

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours to scan"
        required: false
        default: "6"
      limit:
        description: "Max items in report"
        required: false
        default: "15"
      briefing_kind:
        description: "regular, kr_premarket, kr_aftermarket, us_premarket_before, us_premarket_after"
        required: false
        default: "regular"
  schedule:
    # GitHub Actions cron uses UTC.
    # KRX premarket: KST Mon-Fri 08:30 = UTC Sun-Thu 23:30.
    - cron: "30 23 * * 0-4"
    # KRX after close: KST Mon-Fri 15:45 = UTC Mon-Fri 06:45.
    - cron: "45 6 * * 1-5"
    # US premarket before: NY Mon-Fri 03:55 = UTC 07:55 during US daylight saving time.
    - cron: "55 7 * * 1-5"
    # US premarket after / regular open check: NY Mon-Fri 09:25 = UTC 13:25 during US daylight saving time.
    - cron: "25 13 * * 1-5"

# Automatic push-triggered runs remain disabled. Scheduled runs are limited to four market checkpoints.
# US cron slots are set for daylight saving time. Recheck after the US switches back to standard time.

concurrency:
  group: telegram-news-briefing
  cancel-in-progress: false

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONPATH: src
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
      TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
      TELEGRAM_SESSION_NAME: telegram_news_session
      DATABASE_URL: sqlite:///data/news.db
      CHANNEL_CONFIG: config/channels.yaml
      TIMEZONE: Asia/Seoul
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-flash-latest
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_WEB_URL: ${{ secrets.KAKAO_WEB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide market checkpoint
        id: cadence
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, time, timezone
          from pathlib import Path
          from zoneinfo import ZoneInfo

          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          event_path = os.getenv("GITHUB_EVENT_PATH", "")
          schedule = ""
          inputs = {}
          if event_path and Path(event_path).exists():
              with open(event_path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
              schedule = payload.get("schedule", "")
              inputs = payload.get("inputs", {}) or {}

          now_utc = datetime.now(timezone.utc)
          now_kst = now_utc.astimezone(ZoneInfo("Asia/Seoul"))
          now_ny = now_utc.astimezone(ZoneInfo("America/New_York"))

          should_run = True
          reason = "manual"
          hours = inputs.get("hours") or "6"
          briefing_kind = inputs.get("briefing_kind") or "regular"

          def in_window(dt, start_h, start_m, end_h, end_m):
              current = dt.hour * 60 + dt.minute
              start = start_h * 60 + start_m
              end = end_h * 60 + end_m
              return start <= current <= end

          if event_name == "schedule":
              should_run = False
              reason = "scheduled_checkpoint_not_matched"

              if now_kst.weekday() < 5 and in_window(now_kst, 8, 20, 8, 55):
                  should_run = True
                  reason = "kr_premarket"
                  hours = "12"
                  briefing_kind = "kr_premarket"
              elif now_kst.weekday() < 5 and in_window(now_kst, 15, 35, 16, 10):
                  should_run = True
                  reason = "kr_aftermarket"
                  hours = "7"
                  briefing_kind = "kr_aftermarket"
              elif now_ny.weekday() < 5 and in_window(now_ny, 3, 45, 4, 15):
                  should_run = True
                  reason = "us_premarket_before"
                  hours = "8"
                  briefing_kind = "us_premarket_before"
              elif now_ny.weekday() < 5 and in_window(now_ny, 9, 15, 9, 45):
                  should_run = True
                  reason = "us_premarket_after"
                  hours = "6"
                  briefing_kind = "us_premarket_after"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"should_run={str(should_run).lower()}\n")
              out.write(f"reason={reason}\n")
              out.write(f"hours={hours}\n")
              out.write(f"briefing_kind={briefing_kind}\n")
              out.write(f"kst_now={now_kst:%Y-%m-%d %H:%M:%S KST}\n")
              out.write(f"ny_now={now_ny:%Y-%m-%d %H:%M:%S %Z}\n")
              out.write(f"schedule={schedule}\n")

          print(f"KST now: {now_kst:%Y-%m-%d %H:%M:%S KST}")
          print(f"NY now: {now_ny:%Y-%m-%d %H:%M:%S %Z}")
          print(f"event={event_name} schedule={schedule}")
          print(f"should_run={should_run} reason={reason} hours={hours} briefing_kind={briefing_kind}")
          PY

      - name: Set up Python
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required secrets
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          import os, sys

          required = ["TELEGRAM_API_ID", "TELEGRAM_API_HASH", "KAKAO_REST_API_KEY", "KAKAO_REFRESH_TOKEN"]
          missing = [name for name in required if not os.getenv(name)]
          if not os.getenv("TELEGRAM_STRING_SESSION") and not os.getenv("TELEGRAM_PHONE"):
              missing.append("TELEGRAM_STRING_SESSION or TELEGRAM_PHONE")
          if missing:
              print("Missing GitHub Actions secrets: " + ", ".join(missing))
              sys.exit(1)
          if not os.getenv("TELEGRAM_STRING_SESSION"):
              print("WARNING: TELEGRAM_STRING_SESSION is missing. TELEGRAM_PHONE login may require an interactive code and can fail in scheduled Actions.")
          if os.getenv("GEMINI_API_KEY"):
              print("Gemini API key is present. Gemini synthesis will be attempted.")
              print("Gemini model: " + os.getenv("GEMINI_MODEL", "gemini-flash-latest"))
          else:
              print("GEMINI_API_KEY is not set. Local synthesis fallback will be used.")
          print("Required collection and Kakao secrets are present.")
          PY

      - name: Show Kakao send mode
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          import os
          print("Send channel: KakaoTalk memo")
          print("Kakao REST API key: " + ("present" if os.getenv("KAKAO_REST_API_KEY") else "missing"))
          print("Kakao refresh token: " + ("present" if os.getenv("KAKAO_REFRESH_TOKEN") else "missing"))
          PY

      - name: Run Telegram news briefing
        if: steps.cadence.outputs.should_run == 'true'
        env:
          BRIEFING_KIND: ${{ steps.cadence.outputs.briefing_kind }}
        run: |
          mkdir -p data reports
          HOURS="${{ steps.cadence.outputs.hours || '6' }}"
          LIMIT="${{ github.event.inputs.limit || '15' }}"
          python scripts/run_once.py run --hours "$HOURS" --limit "$LIMIT" --send

      - name: Upload report artifact
        if: always() && steps.cadence.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: telegram-news-reports
          path: reports/*.md
          if-no-files-found: ignore
