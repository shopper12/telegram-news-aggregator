name: Telegram news briefing

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "Hours to scan"
        required: false
        default: "6"
      limit:
        description: "Max items in report"
        required: false
        default: "15"
  schedule:
    # Hourly. GitHub Actions cron uses UTC.
    - cron: "5 * * * *"

concurrency:
  group: telegram-news-briefing
  cancel-in-progress: true

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONPATH: src
      TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
      TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_TARGET_CHAT_ID: ${{ secrets.TELEGRAM_TARGET_CHAT_ID }}
      TELEGRAM_SESSION_NAME: telegram_news_session
      DATABASE_URL: sqlite:///data/news.db
      CHANNEL_CONFIG: config/channels.yaml
      TIMEZONE: Asia/Seoul
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1-mini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          python - <<'PY'
          import os, sys
          required = [
              "TELEGRAM_API_ID",
              "TELEGRAM_API_HASH",
              "TELEGRAM_STRING_SESSION",
              "TELEGRAM_BOT_TOKEN",
              "TELEGRAM_TARGET_CHAT_ID",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              print("Missing GitHub Actions secrets: " + ", ".join(missing))
              sys.exit(1)
          PY

      - name: Run Telegram news briefing
        run: |
          mkdir -p data reports
          HOURS="${{ github.event.inputs.hours || '6' }}"
          LIMIT="${{ github.event.inputs.limit || '15' }}"
          python scripts/run_once.py run --hours "$HOURS" --limit "$LIMIT" --send

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-news-reports
          path: reports/*.md
          if-no-files-found: ignore
