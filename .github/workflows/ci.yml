name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest

      - name: API smoke test
        run: |
          python scripts/run_api.py > /tmp/news-api.log 2>&1 &
          API_PID=$!
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/
          curl -fsS http://127.0.0.1:8000/api/news.txt
          kill $API_PID
