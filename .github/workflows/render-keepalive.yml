name: Render keepalive

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL || vars.RENDER_SERVICE_URL }}
    steps:
      - name: Ping health endpoint
        run: |
          if [ -z "$RENDER_SERVICE_URL" ]; then
            echo "RENDER_SERVICE_URL is not set. Add it as a GitHub Actions secret or repository variable."
            exit 0
          fi
          BASE="${RENDER_SERVICE_URL%/}"
          echo "Pinging $BASE/health"
          curl --fail --silent --show-error --max-time 45 --retry 2 --retry-delay 5 "$BASE/health" || exit 1
