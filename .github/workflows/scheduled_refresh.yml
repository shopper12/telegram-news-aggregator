name: Scheduled News Refresh

permissions:
  contents: write

on:
  schedule:
    - cron: '25 23 * * 0-4'  # KST 08:25 월-금 (장전)
    - cron: '55 23 * * 0-4'  # KST 08:55 월-금
    - cron: '55  0 * * 1-5'  # KST 09:55 월-금 (장중)
    - cron: '25  2 * * 1-5'  # KST 11:25
    - cron: '55  2 * * 1-5'  # KST 11:55
    - cron: '25  4 * * 1-5'  # KST 13:25
    - cron: '55  4 * * 1-5'  # KST 13:55
    - cron: '25  6 * * 1-5'  # KST 15:25 (장마감)
    - cron: '55  6 * * 1-5'  # KST 15:55
    - cron: '25 13 * * *'    # KST 22:25 매일 (야간)
    - cron: '*/20 * * * *'   # 20분마다 keep-alive + 성공 시 최신 리포트 동기화
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Refresh Render API and write latest report files
        env:
          NEWS_BOT_API_KEY: ${{ secrets.NEWS_BOT_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p reports
          echo "Calling /api/refresh ..."
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${NEWS_BOT_API_KEY}" \
            -d '{"hours":1,"limit":30,"briefing_kind":"regular"}' \
            --max-time 300 \
            https://telegram-news-bot-api.onrender.com/api/refresh || echo "000")
          echo "HTTP Status: $STATUS"
          cat /tmp/response.json || true
          if [ "$STATUS" != "200" ]; then
            echo "Refresh failed or no API key — sending keep-alive ping only"
            curl -s --max-time 10 https://telegram-news-bot-api.onrender.com/health || true
            exit 0
          fi
          python - <<'PY'
          import json
          import pathlib
          import sys

          response_path = pathlib.Path('/tmp/response.json')
          data = json.loads(response_path.read_text(encoding='utf-8'))
          report = str(data.get('report') or '').strip()
          if len(report) < 100:
              print('Report too short; skip GitHub report update')
              sys.exit(0)
          pathlib.Path('reports').mkdir(exist_ok=True)
          pathlib.Path('reports/latest_report.json').write_text(
              json.dumps(data, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          pathlib.Path('reports/latest_report.md').write_text(report + '\n', encoding='utf-8')
          PY

      - name: Commit latest report if changed
        run: |
          if git diff --quiet -- reports/latest_report.json reports/latest_report.md; then
            echo "No latest report changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest_report.json reports/latest_report.md
          git commit -m "chore: update latest news report"
          git push
